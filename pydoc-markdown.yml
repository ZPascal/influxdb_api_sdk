loaders:
  - type: python
    search_path: [.]
processors:
  - type: filter
  - type: smart
  - type: crossref
renderer:
  type: mkdocs
  pages:
    - title: Home
      name: index
      source: docs/influxdb.md
  mkdocs_config:
    site_name: InfluxDB API SDK
    theme: material
    repo_url: https://github.com/ZPascal/influxdb-python
    markdown_extensions:
        - pymdownx.tasklist